name: docker-update-monitor
services:
  docker-update-monitor:
    image: ghcr.io/stijnpiron/docker-update-monitor:latest
    container_name: docker-update-monitor
    restart: unless-stopped

    environment:
      # Notification channels: comma-separated list of "webhook", "email", "telegram"
      # Default: webhook (backward compatible)
      NOTIFY_CHANNELS: "${NOTIFY_CHANNELS:-webhook}"

      # --- Webhook channel ---
      # Required (if using webhook): where to POST update payloads
      NOTIFY_ENDPOINT: "${NOTIFY_ENDPOINT}"

      # Docker Hub credentials (strongly recommended to avoid anonymous rate limits).
      # Preferred: use a Personal Access Token (PAT) as the password.
      # Generate one at: https://app.docker.com/settings/personal-access-tokens
      DOCKERHUB_USERNAME: "${DOCKERHUB_USERNAME}"
      DOCKERHUB_PASSWORD: "${DOCKERHUB_PASSWORD}" # password or PAT

      # GitHub PAT with read:packages scope — required for ghcr.io images.
      # Generate one at: https://github.com/settings/tokens
      GITHUB_TOKEN: "${GITHUB_TOKEN}"

      # --- Email channel (SMTP) ---
      # Required (if using email): SMTP_HOST, SMTP_FROM, SMTP_TO
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USERNAME: "${SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM}"
      SMTP_TO: "${SMTP_TO}"
      SMTP_TLS: "${SMTP_TLS:-true}"

      # --- Telegram channel ---
      # Required (if using telegram): TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"

      # Cron schedule for checks (default: every hour on the hour)
      # Standard 5-field cron: minute hour day month weekday
      # Examples:
      #   "0 * * * *"    — every hour
      #   "0 */6 * * *"  — every 6 hours
      #   "0 8 * * *"    — daily at 08:00
      #   "0 3 * * 7"    — every Sunday at 03:00
      CRON_SCHEDULE: "${CRON_SCHEDULE:-0 3 * * 7}"

      # Set to "true" to log updates without POSTing — useful for testing
      DRY_RUN: "false"

      # Cooldown period before notifying about a newly detected update.
      # Accepted formats: "0" (no cooldown, default), "12h", "3d", "2w", "1m".
      # Can be overridden per container with the docker-update-monitor.update-cooldown label.
      # UPDATE_COOLDOWN: "0"

      # Label namespace (default: docker-update-monitor)
      # LABEL_PREFIX: "docker-update-monitor"
      # Only docker containers with docker-update-monitor.tag-regex are monitored
      # Example: "docker-update-monitor.tag-regex=^v?\\d+\\.\\

      # Log verbosity: DEBUG | INFO | WARNING | ERROR
      LOG_LEVEL: "INFO"

      # Dashboard datetime display format (Python strftime)
      # Examples: "%d/%m/%Y %H:%M", "%Y-%m-%d %H:%M:%S", "%b %d, %Y %I:%M %p"
      DASHBOARD_DATETIME_FORMAT: "${DASHBOARD_DATETIME_FORMAT:-%d/%m/%Y %H:%M}"

    ports:
      # Expose the web dashboard
      - "8080:8080"

    volumes:
      # Read-only access to the Docker socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistent state database
      - ./data:/app/data

    # Needed so 'nobody' user can access the Docker socket
    group_add:
      - "${DOCKER_GID:-999}"

    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
