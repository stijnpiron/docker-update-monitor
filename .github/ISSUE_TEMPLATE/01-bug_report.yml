name: 🐛 Bug Report
description: Report something that isn't working as expected
title: "[BUG]: "
labels: ["bug"]
assignees: []
projects: ["stijnpiron/6"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please be as detailed as possible — it helps us fix things faster.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Walk us through how to trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: Instead, what happened was...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / Logs
      description: Paste any relevant logs, error messages, or attach screenshots.
      render: shell

  - type: input
    id: version
    attributes:
      label: App / Package Version
      description: Which version are you running?
      placeholder: e.g. v1.2.3
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else we should know? Related issues, workarounds, etc.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched for existing issues and this is not a duplicate
          required: true
        - label: I have included all the information needed to reproduce the bug
          required: true
