name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"           # also trigger on version tags like v1.0.0
  pull_request:
    branches:
      - main           # build (but don't push) on PRs for validation

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. yourname/docker-update-monitor
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatically provided, no setup needed

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # :sha-abcdef1 for every commit (useful for pinning)
            type=sha,prefix=sha-
            # :v1.2.3 and :v1.2 and :v1 from version tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs — dramatically speeds up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build for both amd64 (most servers) and arm64 (Raspberry Pi / Apple M)
          platforms: linux/amd64,linux/arm64
