name: Coverage Report

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tarpaulin-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-tarpaulin-

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Run tests with coverage
        id: coverage
        run: |
          cargo tarpaulin --out Json --output-dir . --skip-clean 2>&1 | tee tarpaulin-output.txt || true
          if [ -f tarpaulin-report.json ]; then
            TOTAL=$(python3 -c "import json; d=json.load(open('tarpaulin-report.json')); print(round(d['coverage'], 1))")
          else
            TOTAL="0"
          fi
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Generate coverage report comment
        id: report
        run: |
          TOTAL="${{ steps.coverage.outputs.total }}"
          INT_TOTAL="${TOTAL%.*}"
          if [ "${INT_TOTAL}" -ge 80 ]; then
            STATUS="✅ **Pass** — coverage is at ${TOTAL}% (threshold: 80%)"
          else
            STATUS="❌ **Fail** — coverage is at ${TOTAL}% (threshold: 80%)"
          fi

          {
            echo "body<<EOF"
            echo "## Coverage Report"
            echo ""
            echo "${STATUS}"
            echo ""
            echo '```'
            tail -20 tarpaulin-output.txt || true
            echo '```'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: ${{ steps.report.outputs.body }}

      - name: Enforce 80% threshold
        run: |
          TOTAL="${{ steps.coverage.outputs.total }}"
          INT_TOTAL="${TOTAL%.*}"
          if [ "${INT_TOTAL}" -lt 80 ]; then
            echo "::error::Coverage ${TOTAL}% is below the 80% threshold"
            exit 1
          fi
